<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galéria | Pedrostol s.r.o.</title>
    <meta name="robots" content="noindex">
    <script>
        if (window.location.protocol !== 'file:') {
            document.write('<base href="/templates/pedrostol/">');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #b48454;
            --color-secondary: #1c1917;
            --color-accent: #fcfaf7;
        }
        body { font-family: 'Manrope', sans-serif; background-color: var(--color-accent); color: var(--color-secondary); }
        .nav-link { position: relative; }
        .nav-link::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1px; background-color: var(--color-primary); transition: width 0.3s ease; }
        .nav-link:hover::after { width: 100%; }
        
        .gallery-item { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .gallery-item.hidden { opacity: 0; transform: scale(0.9) translateY(20px); pointer-events: none; display: none; }
        
        .filter-btn { transition: all 0.3s ease; }
        .filter-btn.active { background-color: var(--color-primary); color: white; border-color: var(--color-primary); }

        /* Custom Lightbox */
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(28, 25, 23, 0.95); z-index: 1000; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        #lightbox.active { display: flex; opacity: 1; }
        #lightbox-img { max-width: 90vw; max-height: 85vh; transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        #lightbox.active #lightbox-img { transform: scale(1); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header id="site-header" class="fixed top-0 left-0 right-0 z-50 bg-[#1c1917] transition-all duration-500">
        <div class="mx-auto w-[95vw] flex items-center justify-between h-16 md:h-24 px-4 md:px-8">
            <a href="index.html" class="flex items-center">
                <span class="text-xl md:text-2xl font-bold text-white tracking-wide uppercase" style="font-family:'DM Serif Display',serif;letter-spacing:0.1em">PEDRO<span style="color:var(--color-primary)">STOL</span></span>
            </a>
            <nav class="hidden md:flex items-center gap-10">
                <a href="index.html" class="nav-link text-white text-[11px] tracking-[0.25em] font-semibold uppercase hover:text-primary transition-colors">Domov</a>
                <a href="galeria.html" class="nav-link text-white text-[11px] tracking-[0.25em] font-semibold uppercase text-primary transition-colors">Galéria</a>
                <a href="index.html#contact" class="nav-link text-white text-[11px] tracking-[0.25em] font-semibold uppercase hover:text-primary transition-colors">Kontakt</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow pt-32 pb-24">
        <div class="container mx-auto px-4">
            <div class="max-w-4xl mx-auto text-center mb-16">
                <div class="flex items-center justify-center gap-4 mb-6">
                    <span class="w-10 h-[1px] bg-[#b48454]"></span>
                    <span class="text-[11px] font-semibold tracking-[0.3em] uppercase text-[#b48454]">Portfólio realizácií</span>
                    <span class="w-10 h-[1px] bg-[#b48454]"></span>
                </div>
                <h1 class="text-4xl md:text-6xl text-[#1c1917] mb-8" style="font-family:'DM Serif Display',serif;font-style:italic">
                    Naša práca s drevom
                </h1>
            </div>

            <!-- Filter Buttons -->
            <div class="flex flex-wrap justify-center gap-4 mb-12">
                <button class="filter-btn active px-8 py-3 text-[10px] font-bold uppercase tracking-widest border border-[#1c1917]/10 hover:border-[#b48454]" data-filter="all">Všetko</button>
                <button class="filter-btn px-8 py-3 text-[10px] font-bold uppercase tracking-widest border border-[#1c1917]/10 hover:border-[#b48454]" data-filter="zrub">Zrubový nábytok</button>
                <button class="filter-btn px-8 py-3 text-[10px] font-bold uppercase tracking-widest border border-[#1c1917]/10 hover:border-[#b48454]" data-filter="stavby">Stavby z dreva</button>
                <button class="filter-btn px-8 py-3 text-[10px] font-bold uppercase tracking-widest border border-[#1c1917]/10 hover:border-[#b48454]" data-filter="ostatne">Nábytok a ostatné</button>
            </div>

            <!-- Gallery Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="gallery-grid">
                <!-- Zrubový nábytok -->
                <div class="gallery-item overflow-hidden aspect-[4/5] relative group cursor-pointer" data-category="zrub" onclick="openLightbox('Stavby-z-dreva-8.jpg')">
                    <img src="Stavby-z-dreva-8.jpg" alt="Zrubový nábytok" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-center justify-center">
                        <span class="text-white text-xs font-bold uppercase tracking-[0.3em]">Zobraziť</span>
                    </div>
                </div>
                <div class="gallery-item overflow-hidden aspect-[4/5] relative group cursor-pointer" data-category="zrub" onclick="openLightbox('hero.jpg')">
                    <img src="hero.jpg" alt="Zrubový nábytok" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-center justify-center">
                        <span class="text-white text-xs font-bold uppercase tracking-[0.3em]">Zobraziť</span>
                    </div>
                </div>

                <!-- Stavby z dreva -->
                <div class="gallery-item overflow-hidden aspect-[4/5] relative group cursor-pointer" data-category="stavby" onclick="openLightbox('Stavby-z-drevo-34.jpg')">
                    <img src="Stavby-z-drevo-34.jpg" alt="Stavba z dreva" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-center justify-center">
                        <span class="text-white text-xs font-bold uppercase tracking-[0.3em]">Zobraziť</span>
                    </div>
                </div>
                <div class="gallery-item overflow-hidden aspect-[4/5] relative group cursor-pointer" data-category="stavby" onclick="openLightbox('Stavby-z-dreva-27.jpg')">
                    <img src="Stavby-z-dreva-27.jpg" alt="Stavba z dreva" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-center justify-center">
                        <span class="text-white text-xs font-bold uppercase tracking-[0.3em]">Zobraziť</span>
                    </div>
                </div>

                <!-- Nábytok a ostatné -->
                <div class="gallery-item overflow-hidden aspect-[4/5] relative group cursor-pointer" data-category="ostatne" onclick="openLightbox('Nabytok-a-ostatne-14.jpg')">
                    <img src="Nabytok-a-ostatne-14.jpg" alt="Ostatné" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-center justify-center">
                        <span class="text-white text-xs font-bold uppercase tracking-[0.3em]">Zobraziť</span>
                    </div>
                </div>
                <div class="gallery-item overflow-hidden aspect-[4/5] relative group cursor-pointer" data-category="ostatne" onclick="openLightbox('Nabytok-a-ostatne-5.jpg')">
                    <img src="Nabytok-a-ostatne-5.jpg" alt="Ostatné" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-center justify-center">
                        <span class="text-white text-xs font-bold uppercase tracking-[0.3em]">Zobraziť</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-[#1c1917] text-white py-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-xs text-white/40 uppercase tracking-[0.2em]">&copy; 2026 PEDROSTOL s.r.o. | Všetky práva vyhradené.</p>
        </div>
    </footer>

    <!-- Lightbox -->
    <div id="lightbox" class="flex" style="display:none" onclick="closeLightbox()">
        <button class="absolute top-8 right-8 text-white hover:text-primary transition-colors">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <img id="lightbox-img" src="" alt="Zväčšený obrázok" class="max-w-[90vw] max-height-[85vh] transition-transform duration-500" onclick="event.stopPropagation()">
    </div>

    <script>
        // Filtering Logic
        const filterBtns = document.querySelectorAll('.filter-btn');
        const galleryItems = document.querySelectorAll('.gallery-item');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Update active state
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const filter = btn.getAttribute('data-filter');

                galleryItems.forEach(item => {
                    const category = item.getAttribute('data-category');
                    if (filter === 'all' || category === filter) {
                        item.style.display = 'block';
                        setTimeout(() => {
                            item.style.opacity = '1';
                            item.style.transform = 'scale(1) translateY(0)';
                        }, 50);
                    } else {
                        item.style.opacity = '0';
                        item.style.transform = 'scale(0.9) translateY(20px)';
                        setTimeout(() => {
                            item.style.display = 'none';
                        }, 500);
                    }
                });
            });
        });

        // Lightbox Logic
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.style.display = 'flex';
            setTimeout(() => {
                lightbox.style.opacity = '1';
                lightboxImg.style.transform = 'scale(1)';
            }, 50);
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.style.opacity = '0';
            lightboxImg.style.transform = 'scale(0.9)';
            setTimeout(() => {
                lightbox.style.display = 'none';
            }, 300);
            document.body.style.overflow = '';
        }
    </script>
</body>
</html>
